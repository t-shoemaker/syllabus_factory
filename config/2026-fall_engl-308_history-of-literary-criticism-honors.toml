[course]
number = "ENGL 308"
title = "History of Literary Criticism"
section = 200
credits = 3
catalog = """
History of critical thought about art and culture from antiquity to the
present; topics and readings span a variety of eras, approaches and artistic
genres. Key themes and ideas in criticism may be presented in the context of
historical figures or entire critical movements such as new criticism,
structuralism and poststructuralism, historical materialism, feminism, race and
ethnic studies and cultural studies, among others. Instructors teaching this
class will choose texts, assessments and approaches that represent historic and
current scholarship and satisfy course learning objectives.
"""
description = """
Our focus will be on the problem of use: What, if anything, is literature for?
What might it mean to speak of literature's usefulness, or its value? What
happens to categories like fiction, figuration, judgment, and even imagination
when they are instrumentalized in terms of use? What, in turn, is the use of
literary criticism? To what ends does it work?

We will trace these questions across six major periods of literary criticism,
spanning from ancient Greece through the emergence of critique. Topics include
imitation and mimesis, metaphor and figurative language, defenses of both
poetry and criticism, taste and judgment, affect, imagination, ideology, and
more.

**Content note --** Since Plato's _Republic_, literary-critical thought has
foregrounded the social role of art and criticism. In many of our readings, we
will encounter critics who explicitly tie their work to various social and
political dynamics, including those that concern race, gender, sexuality,
class, and other axes of identity and power. While students will never be
required to adopt a specific opinion with respect to these matters, you can
expect to engage with challenging ideas, encounter perspectives that may differ
from your own, and think critically about how critics envision their own place
within social and political contexts.
"""
assignments = """
Three times over the course of the semester you will write a 3-4 page **reading
response** about a text of your choosing. The purpose of these responses is to
practice the primary form of critical analysis that we do together in class:
_explanation_ and _argument_. For each response, you will select a passage and
construct an argument about the significance of this passage for the text in
which it appears. You argument, in other words, will focus on how the passage
helps explain something about the text as a whole---what the text is about,
what it tries to do, what its internal mechanics are, where its argument works,
and where that argument might even fail.

Your passage selection (and therefore your argument) should also be informed by
the following question: How is this text developed by future critics? To that
end, you will choose a second text in the _Norton Anthology_, read it, and
relate it back to the core argument of the first text. You will choose this
second text in consultation with me.

At the end of the semester, you will complete a take-home **final exam**, which
consists of 8 multiple-choice questions and short-answer responses. You will
have one week to finish the exam. Each question will center on a key topic from
the course and present several authors who have written about it. You will
select one of these authors and explain how their work relates to the topic.
"""
prerequisites = "3 credits of literature at 200-level or above"
designation = "None"

